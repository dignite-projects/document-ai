name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore core
        run: dotnet restore Dignite.DocumentAI.slnx

      - name: Build core
        run: dotnet build Dignite.DocumentAI.slnx --no-restore --configuration Release

      - name: Restore host
        run: dotnet restore host/src/Dignite.DocumentAI.Host.csproj

      - name: Build host
        run: dotnet build host/src/Dignite.DocumentAI.Host.csproj --no-restore --configuration Release

      - name: Run domain tests
        run: dotnet test core/test/Dignite.DocumentAI.Domain.Tests/Dignite.DocumentAI.Domain.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run application tests
        run: dotnet test core/test/Dignite.DocumentAI.Application.Tests/Dignite.DocumentAI.Application.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Build Docker image
        run: docker build -f host/Dockerfile -t docai-api:${{ github.sha }} .
        if: github.event_name == 'push'

  build-angular:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: angular/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: angular

      - name: Build paperbase library
        run: npx nx build paperbase --configuration production
        working-directory: angular

      - name: Build host application
        run: npx nx build host --configuration production
        working-directory: angular

      - name: Lint
        run: npx nx run-many -t lint
        working-directory: angular

      # Unit tests run on plain Vitest (jsdom) via vitest.config.mts, not the
      # `@angular/build:unit-test` builder — see vitest.setup.ts for the rationale.
      - name: Unit tests
        run: npx vitest run
        working-directory: angular

      # 验证前端 .local 镜像可构建（COPY 路径不回归）。上面的 nx build host 已产出
      # dist/host/browser，此处只打包不推送；context = angular/。
      - name: Build Angular Docker image
        run: docker build -f apps/host/Dockerfile.local -t paperbase-web:${{ github.sha }} .
        working-directory: angular
        if: github.event_name == 'push'
