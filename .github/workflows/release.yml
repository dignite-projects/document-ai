# Release workflow (standby): 0.1.0 is not tagged yet; this workflow is in place but
# will not trigger until a matching tag is pushed or it is run manually.
# Triggers: push a v* tag (for example v0.1.0) or use workflow_dispatch. Manual runs
# only build / pack / upload artifacts and do not create a GitHub Release.
#
# Note: NuGet package versions come from <Version> in common.props. Tags do not drive
# the version number, so confirm common.props is updated before tagging.
#
# npm package (@dignite/document-ai) publishing is not automated yet. Manual flow:
#   cd angular
#   npx nx build document-ai --configuration production
#   npm publish dist/document-ai
# The version lives in angular/packages/document-ai/package.json; move this into the
# workflow once the publish cadence is stable.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required by softprops/action-gh-release to create a draft Release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Dignite.DocumentAI.slnx

      - name: Build
        run: dotnet build Dignite.DocumentAI.slnx --no-restore --configuration Release

      # Same backend test set as ci.yml; all are dependency-light
      # (SQLite in-memory / mocks / minimal TestServer).
      - name: Run domain tests
        run: dotnet test core/test/Dignite.DocumentAI.Domain.Tests/Dignite.DocumentAI.Domain.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run application tests
        run: dotnet test core/test/Dignite.DocumentAI.Application.Tests/Dignite.DocumentAI.Application.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run EF Core tests
        run: dotnet test core/test/Dignite.DocumentAI.EntityFrameworkCore.Tests/Dignite.DocumentAI.EntityFrameworkCore.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run MCP tests
        run: dotnet test core/test/Dignite.DocumentAI.Mcp.Tests/Dignite.DocumentAI.Mcp.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run OCR VisionLlm tests
        run: dotnet test core/test/Dignite.DocumentAI.Ocr.VisionLlm.Tests/Dignite.DocumentAI.Ocr.VisionLlm.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Run host tests
        run: dotnet test host/test/Dignite.DocumentAI.Host.Tests/Dignite.DocumentAI.Host.Tests.csproj --no-build --configuration Release --verbosity normal

      # Projects with IsPackable=false (host / test projects; test projects are implicitly false
      # via Microsoft.NET.Test.Sdk) are skipped automatically. Only NuGet packages under core/src
      # are produced.
      - name: Pack
        run: dotnet pack Dignite.DocumentAI.slnx --no-build --configuration Release -o ./artifacts

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          if-no-files-found: error

      # Secrets cannot be referenced directly in if: expressions. Inject through env and check in
      # the shell; skip the push when not configured.
      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::notice::NUGET_API_KEY secret is not configured; skipping NuGet push (packages were uploaded as workflow artifacts)."
            exit 0
          fi
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # Create a draft Release only on tag pushes (workflow_dispatch has no tag context).
      # Review the draft release notes manually before publishing.
      - name: Create draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/*.nupkg
